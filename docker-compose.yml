services:
    payload:
        image: node:20-alpine
        container_name: deleyna-payload
        ports:
            - '3000:3000'
        volumes:
            - .:/home/node/app
            - node_modules:/home/node/app/node_modules
        working_dir: /home/node/app/
        command: sh -c "corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm dev"
        depends_on:
            postgres:
                condition: service_healthy
            minio:
                condition: service_healthy
        env_file:
            - .env
        networks:
            - deleyna-network

    postgres:
        image: postgres:16-alpine
        container_name: deleyna-postgres
        restart: always
        env_file: '.env'
        command: postgres -c max_connections=200
        environment:
            POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
        volumes:
            - pgdata:/var/lib/postgresql/data
        ports:
            - '5433:5432'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - deleyna-network

    minio:
        image: minio/minio:latest
        container_name: deleyna-minio
        command: server /data --console-address ":9090"
        env_file: '.env'
        ports:
            - '9001:9000'
            - '9091:9090'
        volumes:
            - minio_data:/data
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - deleyna-network

    minio-setup:
        image: minio/mc:latest
        container_name: deleyna-minio-setup
        depends_on:
            minio:
                condition: service_healthy
        env_file: '.env'
        entrypoint: >
            /bin/sh -c "
              set -euo pipefail
              mc alias set local http://minio:9000 $${S3_ACCESS_KEY_ID} $${S3_SECRET_ACCESS_KEY}
              mc mb -p local/$${S3_BUCKET} || true
            "
        networks:
            - deleyna-network

networks:
    deleyna-network:
        driver: bridge
        name: deleyna-network

volumes:
    pgdata:
        name: deleyna-pgdata
    minio_data:
        name: deleyna-minio-data
    node_modules:
        name: deleyna-node-modules
